name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Unit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run compile

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test

  build:
    name: Build (${{ matrix.browser }})
    runs-on: ubuntu-24.04
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build ${{ matrix.browser }}
        run: npm run build:${{ matrix.browser }}

      - name: web-ext lint (Firefox only)
        if: matrix.browser == 'firefox'
        run: npm run lint:webext

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.browser }}-mv3
          path: .output/${{ matrix.browser }}-mv3/
          retention-days: 14

  e2e:
    name: Playwright smoke (bundled Chromium)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Chrome extension
        run: npm run build:chrome

      - name: E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
