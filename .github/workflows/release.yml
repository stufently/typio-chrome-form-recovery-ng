name: Release

# Triggered by a SemVer tag like v1.0.0 — see CONTRIBUTING.md for the release
# cookbook. Builds every browser target, attaches zipped artefacts to the
# GitHub release, then (if the corresponding store secrets are configured)
# uploads to Chrome Web Store / Mozilla AMO / Microsoft Edge.
# Edge Add-ons does have a Partner Center "Update REST API" for already-listed
# extensions; the first submission still goes through the Partner Center UI.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release, e.g. v1.0.0'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Sync package.json version with the release tag
        run: |
          set -euo pipefail
          REF="${{ inputs.tag || github.ref_name }}"
          # tag form 'v1.2.3' → bare '1.2.3'
          VERSION="${REF#v}"
          npm pkg set version="$VERSION"

      - name: Regenerate icons
        run: npm run icons

      - name: Build
        run: npm run build:${{ matrix.browser }}

      - name: web-ext lint (Firefox)
        if: matrix.browser == 'firefox'
        run: npm run lint:webext

      - name: Zip
        run: npm run zip:${{ matrix.browser }}

      - name: Stage release artefact (non-hidden so upload-artifact picks it up)
        run: |
          set -euxo pipefail
          mkdir -p release-artifact
          ZIP="$(find .output -maxdepth 1 -type f -name "*-${{ matrix.browser }}.zip" -print -quit)"
          test -n "$ZIP" && test -s "$ZIP"
          cp "$ZIP" release-artifact/
          if [ -f .output/typio-chrome-form-recovery-ng-sources.zip ]; then
            cp .output/typio-chrome-form-recovery-ng-sources.zip release-artifact/
          fi
          ls -la release-artifact/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.browser }}-mv3
          path: release-artifact/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Attach to GitHub release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: artefacts
          pattern: '*-mv3'
          merge-multiple: true

      - name: Compose Opera package (chrome-format zip)
        run: |
          set -euxo pipefail
          echo "=== artefacts tree ==="
          find artefacts -type f | sort
          CHROME_ZIP="$(find artefacts -type f -name '*-chrome.zip' -print -quit)"
          test -n "$CHROME_ZIP" && test -s "$CHROME_ZIP"
          mkdir -p artefacts/opera
          cp "$CHROME_ZIP" artefacts/opera/typio-chrome-form-recovery-ng-opera.zip
          echo "=== final zip list ==="
          find artefacts -type f -name '*.zip' | sort

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
          mapfile -t ZIPS < <(find artefacts -type f -name '*.zip' | sort -u)
          gh release upload "$TAG" --clobber "${ZIPS[@]}"

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: release
    runs-on: ubuntu-24.04
    if: ${{ vars.CWS_EXTENSION_ID != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chrome-mv3
          path: chrome-build

      - name: Locate Chrome zip
        id: zip
        run: |
          set -euxo pipefail
          ZIP="$(ls chrome-build/*.zip | head -1)"
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload + publish
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: ${{ steps.zip.outputs.path }}
          extension-id: ${{ vars.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true

  publish-amo:
    name: Sign + publish to Firefox AMO
    needs: release
    runs-on: ubuntu-24.04
    if: ${{ vars.AMO_PUBLISH == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: firefox-mv3
          path: firefox-build

      - name: Build source archive for AMO review
        run: npm run zip:sources

      - name: web-ext sign (listed)
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          set -euxo pipefail
          SRC_ZIP="$(ls .output/*-sources.zip | head -1)"
          npx web-ext sign \
            --source-dir=firefox-build/firefox-mv3 \
            --channel=listed \
            --upload-source-code="$SRC_ZIP" \
            --api-key="$WEB_EXT_API_KEY" \
            --api-secret="$WEB_EXT_API_SECRET" \
            --artifacts-dir=signed/
